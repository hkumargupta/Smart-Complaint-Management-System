<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login | स्मार्ट शिकायत</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(-45deg, #1a1a2e, #16213e, #0f3460, #533483);
    background-size: 400% 400%;
    animation: gradient 15s ease infinite;
    overflow:hidden;
}

@keyframes gradient {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* Floating Orbs */
.orb {
    position:absolute;
    border-radius:50%;
    filter:blur(80px);
    opacity:0.5;
    animation:float 10s infinite ease-in-out;
}

.orb-1{
    width:300px;
    height:300px;
    background:#667eea;
    top:-100px;
    left:-100px;
}

.orb-2{
    width:250px;
    height:250px;
    background:#764ba2;
    bottom:-80px;
    right:-80px;
    animation-delay:2s;
}

.orb-3{
    width:200px;
    height:200px;
    background:#f093fb;
    top:50%;
    right:10%;
    animation-delay:4s;
}

@keyframes float{
    0%,100%{ transform:translate(0,0) scale(1);}
    50%{ transform:translate(30px,-30px) scale(1.1);}
}

/* Login Card */
.login-card{
    position:relative;
    z-index:1;
    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,0.2);
    padding:45px 40px;
    width:400px;
    border-radius:25px;
    box-shadow:0 25px 50px rgba(0,0,0,0.3);
    animation:slideUp 0.8s ease;
}

@keyframes slideUp{
    from{opacity:0;transform:translateY(50px);}
    to{opacity:1;transform:translateY(0);}
}

.login-header{
    text-align:center;
    margin-bottom:35px;
}

.login-header i{
    font-size:60px;
    color:#667eea;
    margin-bottom:15px;
    display:block;
    animation:bounce 2s infinite;
}

@keyframes bounce{
    0%,100%{ transform:translateY(0);}
    50%{ transform:translateY(-10px);}
}

.login-header h1{
    font-size:28px;
    color:white;
    margin-bottom:8px;
}

.login-header p{
    color:rgba(255,255,255,0.7);
    font-size:14px;
}

/* Form */
.form-group{
    position:relative;
    margin-bottom:25px;
}

.form-group i{
    position:absolute;
    left:18px;
    top:50%;
    transform:translateY(-50%);
    color:rgba(255,255,255,0.6);
    font-size:18px;
    transition:0.3s;
}

.form-group input{
    width:100%;
    padding:16px 16px 16px 50px;
    border-radius:15px;
    border:2px solid rgba(255,255,255,0.2);
    background:rgba(255,255,255,0.1);
    color:white;
    font-size:15px;
    outline:none;
    transition:0.3s;
}

.form-group input::placeholder{
    color:rgba(255,255,255,0.5);
}

.form-group input:focus{
    border-color:#667eea;
    background:rgba(255,255,255,0.15);
    box-shadow:0 0 0 4px rgba(102,126,234,0.2);
}

.form-group input:focus + i{
    color:#667eea;
}

/* Password Toggle */
.password-toggle{
    position:absolute;
    right:18px;
    top:50%;
    transform:translateY(-50%);
    color:rgba(255,255,255,0.6);
    cursor:pointer;
    transition:0.3s;
}

.password-toggle:hover{
    color:#667eea;
}

/* Submit Button */
.btn-login{
    width:100%;
    padding:16px;
    border:none;
    border-radius:15px;
    background:linear-gradient(135deg, #667eea, #764ba2);
    color:white;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    margin-top:10px;
}

.btn-login:hover{
    transform:translateY(-3px);
    box-shadow:0 15px 30px rgba(102,126,234,0.4);
}

.btn-login:active{
    transform:scale(0.98);
}

/* Remember Me */
.remember-me{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin:20px 0;
    padding:0 5px;
}

.remember-me label{
    display:flex;
    align-items:center;
    gap:10px;
    color:rgba(255,255,255,0.8);
    font-size:14px;
    cursor:pointer;
}

.remember-me input[type="checkbox"]{
    width:18px;
    height:18px;
    accent-color:#667eea;
    cursor:pointer;
}

.remember-me a{
    color:#667eea;
    font-size:14px;
    text-decoration:none;
    transition:0.3s;
}

.remember-me a:hover{
    color:#f093fb;
}

/* Divider */
.divider{
    display:flex;
    align-items:center;
    margin:25px 0;
}

.divider::before,
.divider::after{
    content:'';
    flex:1;
    height:1px;
    background:rgba(255,255,255,0.2);
}

.divider span{
    padding:0 15px;
    color:rgba(255,255,255,0.5);
    font-size:12px;
}

/* Back Button */
.btn-back{
    width:100%;
    padding:14px;
    border:none;
    border-radius:15px;
    background:rgba(255,255,255,0.1);
    border:2px solid rgba(255,255,255,0.2);
    color:white;
    font-size:15px;
    font-weight:500;
    cursor:pointer;
    transition:0.3s;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
}

.btn-back:hover{
    background:rgba(255,255,255,0.2);
    border-color:#667eea;
}

/* Error Message */
.error-msg{
    background:rgba(255,77,77,0.2);
    border:1px solid rgba(255,77,77,0.5);
    color:#ff6b6b;
    padding:12px 15px;
    border-radius:10px;
    margin-bottom:20px;
    font-size:14px;
    display:none;
    animation:shake 0.5s ease;
}

@keyframes shake{
    0%,100%{ transform:translateX(0);}
    25%{ transform:translateX(-10px);}
    75%{ transform:translateX(10px);}
}

/* Security Info */
.security-info{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    margin-top:20px;
    color:rgba(255,255,255,0.5);
    font-size:12px;
}

.security-info i{
    color:#11998e;
}

/* Responsive */
@media(max-width:480px){
    .login-card{
        width:90%;
        padding:30px 25px;
    }
    
    .login-header h1{
        font-size:24px;
    }
}
</style>

</head>

<body>

<!-- Floating Orbs -->
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<div class="login-card">
    <div class="login-header">
        <i class="fas fa-shield-alt"></i>
        <h1>Admin Login</h1>
        <p>Access your dashboard securely</p>
    </div>

    <!-- Error Message -->
    <div class="error-msg" id="errorMsg">
        <i class="fas fa-exclamation-circle"></i> Invalid credentials. Please try again.
    </div>

    <form method="post" id="loginForm">
        <div class="form-group">
            <input type="text" name="username" id="username" placeholder="Username" required>
            <i class="fas fa-user"></i>
        </div>

        <div class="form-group">
            <input type="password" name="password" id="password" placeholder="Password" required>
            <i class="fas fa-lock"></i>
            <i class="fas fa-eye password-toggle" onclick="togglePassword()"></i>
        </div>

        <div class="remember-me">
            <label>
                <input type="checkbox" id="remember">
                Remember me
            </label>
            <a href="#">Forgot Password?</a>
        </div>

        <button type="submit" class="btn-login">
            <i class="fas fa-sign-in-alt"></i>
            Login to Dashboard
        </button>
    </form>

    <div class="divider">
        <span>SECURE ACCESS</span>
    </div>

    <a href="/" class="btn-back">
        <i class="fas fa-arrow-left"></i>
        Back to Home
    </a>

    <div class="security-info">
        <i class="fas fa-lock"></i>
        <span>256-bit SSL Encrypted Connection</span>
    </div>
</div>

<script>
// Password Toggle
function togglePassword(){
    const passwordInput = document.getElementById('password');
    const toggleIcon = document.querySelector('.password-toggle');
    
    if(passwordInput.type === 'password'){
        passwordInput.type = 'text';
        toggleIcon.classList.remove('fa-eye');
        toggleIcon.classList.add('fa-eye-slash');
    }else{
        passwordInput.type = 'password';
        toggleIcon.classList.remove('fa-eye-slash');
        toggleIcon.classList.add('fa-eye');
    }
}

// Form Validation
document.getElementById('loginForm').addEventListener('submit', function(e){
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;
    const errorMsg = document.getElementById('errorMsg');
    
    // Simple validation animation
    if(username && password){
        // Add loading effect
        const btn = document.querySelector('.btn-login');
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Authenticating...';
        btn.style.opacity = '0.8';
    }
});

// Check for error from server (flash message)
window.onload = function(){
    const urlParams = new URLSearchParams(window.location.search);
    if(urlParams.get('error') === '1'){
        document.getElementById('errorMsg').style.display = 'block';
    }
}

// Add typing animation to inputs
const inputs = document.querySelectorAll('input');
inputs.forEach(input => {
    input.addEventListener('focus', function(){
        this.parentElement.querySelector('i:not(.password-toggle)').style.color = '#667eea';
    });
    input.addEventListener('blur', function(){
        if(!this.value){
            this.parentElement.querySelector('i:not(.password-toggle)').style.color = 'rgba(255,255,255,0.6)';
        }
    });
});
</script>

</body>
</html>
